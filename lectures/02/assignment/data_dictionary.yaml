# Data Dictionary: EHR Encounters + Procedures Generator
# Synthetic healthcare data for Polars lazy/streaming assignment

version: 1.0
description: Synthetic EHR encounters with ICD-10 diagnoses and HCPCS procedures for diabetes management workflow

tables:
  encounters:
    description: Hospital/clinic encounter records
    row_count_target:
      small: 500_000
      large: 5_000_000
    columns:
      encounter_id:
        type: string
        description: Unique encounter identifier
        example: "ENC-2024-00123456"
      patient_id:
        type: string
        description: Patient identifier (links to vitals/labs)
        example: "PAT-005678"
      facility:
        type: categorical
        description: Healthcare facility
        values: ["UCSF Medical Center", "ZSFG", "Mission Bay", "Mount Zion", "Parnassus"]
      encounter_type:
        type: categorical
        description: Type of encounter
        values: ["Inpatient", "Outpatient", "Emergency", "Urgent Care", "Telehealth"]
      admit_ts:
        type: datetime
        description: Admission/encounter start timestamp
        example: "2024-01-15T08:30:00Z"
      discharge_ts:
        type: datetime
        description: Discharge/encounter end timestamp
        example: "2024-01-17T14:20:00Z"
      primary_diagnosis_icd10:
        type: string
        description: Primary diagnosis ICD-10 code
        example: "E11.9"
      primary_diagnosis_desc:
        type: string
        description: Primary diagnosis description
        example: "Type 2 diabetes mellitus without complications"
      disposition:
        type: categorical
        description: Discharge disposition
        values: ["Home", "Rehab", "SNF", "Transfer", "Expired"]

  procedures:
    description: Procedures performed during encounters (HCPCS codes)
    row_count_target:
      small: 800_000
      large: 8_000_000
    columns:
      procedure_id:
        type: string
        description: Unique procedure identifier
        example: "PROC-2024-00987654"
      encounter_id:
        type: string
        description: Link to encounter record
        example: "ENC-2024-00123456"
      hcpcs_code:
        type: string
        description: HCPCS procedure code
        example: "83036"
      hcpcs_desc:
        type: string
        description: HCPCS procedure description
        example: "Hemoglobin A1c test"
      procedure_ts:
        type: datetime
        description: Procedure timestamp
        example: "2024-01-15T09:15:00Z"
      ordering_provider:
        type: string
        description: Ordering provider ID
        example: "DR-00123"
      result_value:
        type: float
        description: Numeric result (if applicable)
        example: 7.2
      result_unit:
        type: string
        description: Result unit (if applicable)
        example: "%"

  vitals:
    description: Vital signs measurements (wearable and clinical)
    row_count_target:
      small: 50_000
      large: 500_000
    columns:
      vital_id:
        type: string
        description: Unique vital measurement identifier
        example: "VIT-2024-01234567"
      patient_id:
        type: string
        description: Patient identifier
        example: "PAT-005678"
      measurement_ts:
        type: datetime
        description: Measurement timestamp
        example: "2024-01-15T08:45:00Z"
      source:
        type: categorical
        description: Measurement source
        values: ["Wearable", "Clinical", "Home Monitor", "Pharmacy"]
      heart_rate:
        type: integer
        unit: bpm
        description: Heart rate
        range: [40, 180]
      systolic_bp:
        type: integer
        unit: mmHg
        description: Systolic blood pressure
        range: [80, 200]
      diastolic_bp:
        type: integer
        unit: mmHg
        description: Diastolic blood pressure
        range: [40, 120]
      blood_glucose:
        type: float
        unit: mg/dL
        description: Blood glucose level
        range: [50, 400]
      temperature:
        type: float
        unit: "°C"
        description: Body temperature
        range: [35.0, 41.0]
      spo2:
        type: float
        unit: "%"
        description: Blood oxygen saturation
        range: [85, 100]

  patients:
    description: Patient demographic and clinical profile
    row_count_target:
      small: 100_000
      large: 1_000_000
    columns:
      patient_id:
        type: string
        description: Patient identifier
        example: "PAT-005678"
      age:
        type: integer
        unit: years
        description: Patient age
        range: [18, 90]
      gender:
        type: categorical
        description: Gender
        values: ["Female", "Male", "Other"]
      race_ethnicity:
        type: categorical
        description: Race/ethnicity
        values: ["White", "Black", "Hispanic", "Asian", "Other"]
      insurance:
        type: categorical
        description: Insurance type
        values: ["Medicare", "Medicaid", "Private", "Self-pay", "Other"]
      diabetes_type:
        type: categorical
        description: Diabetes classification
        values: ["Type 1", "Type 2", "Gestational", "None", "Pre-diabetes"]
      hba1c_baseline:
        type: float
        unit: "%"
        description: Baseline HbA1c
        range: [4.5, 14.0]
      comorbidities:
        type: array
        description: Relevant comorbidities
        items: ["Hypertension", "Hyperlipidemia", "Obesity", "CKD", "CAD", "None"]

code_lookups:
  icd10_diabetes:
    description: Common ICD-10 codes for diabetes and related conditions
    codes:
      E11.9: "Type 2 diabetes mellitus without complications"
      E11.8: "Type 2 diabetes mellitus with other specified complications"
      E11.65: "Type 2 diabetes mellitus with hyperglycemia"
      E11.40: "Type 2 diabetes mellitus with diabetic neuropathy"
      E11.21: "Type 2 diabetes mellitus with diabetic nephropathy"
      E11.51: "Type 2 diabetes mellitus with diabetic retinopathy"
      E10.9: "Type 1 diabetes mellitus without complications"
      E13.0: "Other specified diabetes mellitus with diabetic coma"
      I10: "Essential (primary) hypertension"
      E78.5: "Hyperlipidemia, unspecified"
      E66.9: "Obesity, unspecified"
      N18.9: "Chronic kidney disease, unspecified"
      I25.10: "Atherosclerotic heart disease of native coronary artery without angina pectoris"

  hcpcs_diabetes:
    description: Common HCPCS codes for diabetes management and testing
    codes:
      "83036": "Hemoglobin A1c test"
      "82947": "Glucose, blood, quantitative (reagent strip)"
      "82951": "Glucose, quantitative, blood (except reagent strip)"
      "84295": "Creatinine, blood"
      "80053": "Complete blood count (CBC)"
      "84443": "Alanine aminotransferase (ALT) (SGPT)"
      "84450": "Aspartate aminotransferase (AST) (SGOT)"
      "82565": "Creatine kinase (CK), total"
      "82570": "Creatine kinase (CK), isoenzymes"
      "83735": "Lipid panel"
      "84480": "Cholesterol, total"
      "84478": "Cholesterol, HDL"
      "84481": "Cholesterol, LDL"
      "82670": "Triglycerides"
      "81002": "Urinalysis, by dip stick"
      "81003": "Urinalysis, by microscopy"
      "99213": "Outpatient visit, established patient"
      "99214": "Outpatient visit, established patient, higher complexity"
      "99215": "Outpatient visit, established patient, highest complexity"
      "G0472": "Annual wellness visit"
      "G0402": "Initial preventive physical examination"
      "G0438": "Annual wellness visit, subsequent"
      "G0439": "Annual wellness visit, subsequent, high risk"

generation_notes:
  temporal_coverage: "2 years of synthetic data (2024-2025)"
  correlation_structure: |
    - Diabetes severity correlates with HbA1c, glucose, and comorbidity burden
    - Older patients have more encounters and procedures
    - Inpatient encounters have longer stays and more procedures
    - Wearable vitals show higher frequency than clinical measurements
    - Procedure codes align with diagnosis codes (e.g., HbA1c for diabetes)
  realistic_constraints: |
    - Encounters cannot overlap for same patient
    - Procedure timestamps must fall within encounter window
    - Vital signs follow physiological ranges and diurnal patterns
    - HbA1c values change slowly (months) vs glucose (hours)
  data_quality_flags: |
    - Include null values for missing clinical data (realistic EHR gaps)
    - Add outlier values for data cleaning exercises
    - Vary measurement frequency by source (wearable > clinical)