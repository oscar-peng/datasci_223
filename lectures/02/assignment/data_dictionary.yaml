# Data Dictionary: Assignment 02 EHR (ICD-10 + HCPCS)
# Synthetic healthcare data for Polars lazy/streaming workflows

version: 2.0
description: Synthetic EHR events with ICD-10 diagnoses and HCPCS procedures for a type 2 diabetes-focused population

tables:
  patients:
    description: Patient demographics and assigned primary site
    row_count_target:
      small: 200
      medium: 1000
      large: 5000
    columns:
      patient_id:
        type: string
        description: Unique patient identifier
        example: "PAT-000123"
      dob:
        type: date
        description: Date of birth (ISO string)
        example: "1972-11-05"
      gender:
        type: categorical
        description: Self-reported gender
        values: ["Female", "Male", "Nonbinary"]
      zip_code:
        type: string
        description: Residential ZIP code (5-digit)
        example: "94110"
      home_site_id:
        type: string
        description: Primary site assignment
        example: "SITE-002"

  sites:
    description: Care delivery sites (clinics, hospitals, specialty centers)
    row_count_target:
      small: 3
      medium: 5
      large: 8
    columns:
      site_id:
        type: string
        description: Unique site identifier
        example: "SITE-003"
      site_name:
        type: string
        description: Friendly site name
        example: "Oakland Community Clinic"
      site_type:
        type: categorical
        description: Site category
        values: ["Community Clinic", "Regional Hospital", "Specialty Center"]
      zip_code:
        type: string
        description: Site ZIP code (5-digit)
        example: "94607"
      panel_size:
        type: integer
        description: Approximate patient panel size
        example: 850

  events:
    description: Long table of diagnosis and procedure events
    row_count_target:
      small: 2000
      medium: 15000
      large: 80000
    columns:
      event_id:
        type: string
        description: Unique event identifier
        example: "EVT-2024-00001234"
      patient_id:
        type: string
        description: Patient identifier (links to patients)
        example: "PAT-000123"
      site_id:
        type: string
        description: Site where the event occurred
        example: "SITE-002"
      event_ts:
        type: datetime
        description: Event timestamp
        example: "2024-03-18T14:32:00"
      record_type:
        type: categorical
        description: Diagnosis vs procedure record type
        values: ["ICD10", "HCPCS"]
      code:
        type: string
        description: ICD-10 or HCPCS/CPT code
        example: "E11.9"

  icd10_codes:
    description: ICD-10 codes used in the synthetic population
    columns:
      code:
        type: string
        description: ICD-10 code with decimal
        example: "E11.65"
      short_desc:
        type: string
        description: Short description
        example: "Type 2 diabetes mellitus with hyperglycemia"
      category:
        type: string
        description: Condition grouping derived from prefix
        example: "type_2_diabetes"

  hcpcs_codes:
    description: HCPCS/CPT codes used in the synthetic population
    columns:
      code:
        type: string
        description: HCPCS code
        example: "83036"
      short_desc:
        type: string
        description: Short description
        example: "Hemoglobin A1c test"
      group:
        type: string
        description: DHS group header from the source list
        example: "CLINICAL LABORATORY SERVICES"
