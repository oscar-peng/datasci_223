name: Autograding

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupytext papermill nbformat pytest

      - name: Download latest test files
        run: |
          mkdir -p .github/tests
          curl -o .github/tests/test_assignment.py \
            https://raw.githubusercontent.com/christopherseaman/ds223-26w-hw09/refs/heads/main/.github/tests/test_assignment.py || true
          pip install -r .github/tests/requirements.txt 2>/dev/null || true

      - name: Run assignment notebook
        run: |
          jupytext --to notebook assignment.md
          jupyter nbconvert --execute --to notebook assignment.ipynb --ExecutePreprocessor.timeout=600

      - name: Run tests
        run: |
          pytest .github/tests/test_assignment.py -v
