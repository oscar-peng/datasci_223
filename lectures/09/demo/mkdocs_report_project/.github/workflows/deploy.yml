name: Deploy Neonatal Feeding Study

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run neonatal feeding analysis pipeline
      run: |
        echo "🏥 Running neonatal feeding study pipeline..."
        python orchestrator.py --no-build
        echo "✅ Analysis pipeline completed"
    
    - name: Build MkDocs site
      run: |
        echo "🌐 Building documentation site..."
        mkdocs build
        echo "✅ Site built successfully"
    
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        commit_message: "🚀 Deploy neonatal feeding study report"
    
    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🏥 **Neonatal Feeding Study Pipeline Results**\n\n✅ Analysis completed successfully\n✅ Interactive charts generated\n✅ Documentation site built\n\nThe pipeline analyzed feeding progression patterns in premature infants and generated automated reports with interactive visualizations.'
          })