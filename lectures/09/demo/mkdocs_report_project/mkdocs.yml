site_name: Neonatal Feeding Study Pipeline
site_description: 'Automated analysis of feeding progression patterns in premature infants'
site_author: 'Clinical Data Science Team'
# site_url: 'https://yourusername.github.io/neonatal-feeding-study' # IMPORTANT: Students should change this

# Repository information (optional, for GitHub integration)
repo_name: 'yourusername/neonatal-feeding-study' # IMPORTANT: Students should change this
repo_url: 'https://github.com/yourusername/neonatal-feeding-study' # IMPORTANT: Students should change this

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - charts  # Using mkdocs-charts-plugin for interactive Vega-Lite charts

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Required JavaScript dependencies for mkdocs-charts-plugin
extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6

nav:
  - 'Home': 'index.md'
  - 'Analysis':
    - 'Data Overview': 'analysis/data_overview.md'
    - 'Automated Analysis': 'analysis/automated_analysis.md'
    - 'Risk Factors': 'analysis/risk_factors.md'
  - 'Interactive Charts': 'interactive_charts.md'
  - 'Methodology': 'methodology.md'
  - 'About': 'about.md'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername # IMPORTANT: Students should change this