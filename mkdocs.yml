site_name: Applied Data Science with Python
site_description: UCSF DataSci 223 Course Materials
docs_dir: lectures
site_dir: docs
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-1
        name: Switch to system preference
  favicon: overrides/assets/images/favicon.png
  features:
    - header.autohide
    - toc.integrate
    - navigation.instant
    - navigation.tracking
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - minify:
      minify_html: true
  - callouts
  - charts
  - exporter:
      enabled: true
      buttons:
        - title: Download as PDF
          icon: material-file-download-outline
          enabled: !!python/name:mkdocs_exporter.formats.pdf.buttons.download.enabled
          attributes: !!python/name:mkdocs_exporter.formats.pdf.buttons.download.attributes
      formats:
        pdf:
          enabled: true
          concurrency: 1
          explicit: true

nav:
  - Home: index.md
  - Lectures:
      - '01. Setup + Debugging': 01/lecture_01.md
      # - '02. SQL': 02/lecture_02.md
      # - '03. Larger-than-Memory Data': 03/lecture_03.md
      # - '04. NLP Foundations': 04/lecture_04.md
      # - '05. Classification': 05/lecture_05.md
      # - '06. Neural Networks': 06/lecture_06.md
      # - '07. Transformers': 07/lecture_07.md
      # - '08. LLMs – DIY': 08/lecture_08.md
      # - '09. LLMs – API & Workflows': 09/lecture_09.md
      # - '10. Time Series': 10/lecture_10.md
      # - '11. TBD': 11/lecture_11.md
  - Exercises:
      - '01. Setup + Debugging': https://classroom.github.com/a/PLACEHOLDER
      # Add exercise links as assignments are created
  - Course Info:
      - Lecture Plan: planned_lectures.md

