site_name: Applied Data Science with Python
site_description: UCSF DataSci 223 Course Materials
docs_dir: lectures
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-1
        name: Switch to system preference
  favicon: overrides/assets/images/favicon.png
  features:
    - header.autohide
    - toc.integrate
    - navigation.instant
    - navigation.tracking
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - minify:
      minify_html: true
  - callouts
  - charts
  - exporter:
      enabled: true
      buttons:
        - title: Download as PDF
          icon: material-file-download-outline
          enabled: !!python/name:mkdocs_exporter.formats.pdf.buttons.download.enabled
          attributes: !!python/name:mkdocs_exporter.formats.pdf.buttons.download.attributes
      formats:
        pdf:
          enabled: true
          concurrency: 1
          # Remove unrecognized options
          explicit: true

nav:
  - Home: index.md
  - Course Information:
      - Syllabus: syllabus.md
      - Project: project.md
      - References: references.md
      - 'Keras Cheat Sheet': nn_keras_cheat_sheet.md
      - 'PyTorch Cheat Sheet': nn_pytorch_cheat_sheet.md
  - Lectures:
      - '01. `git init`': 01/lecture_01.md
      - '02. bugs, ducks, and data': 02/lecture_02.md
      - '03. `JOIN` the `DISTINCT` with SQL': 03/lecture_03.md
      - "04. Time Keeps on Slippin' Into the Forecast": 04/lecture_04.md
      - '05. Putting a label on it': 05/lecture_05.md
      - '06. Neural Networks: If I only had a brain': 06/lecture_06.md
      - "07. Transformers: More than Meets the Eye": 07/lecture_07.md
      - '08. Transformers: The Movie': 08/lecture_08.md
      - '09. Visualize This': 09/lecture_09.md
      - '10. The Final Frontier: Scale and Design': 10/lecture_10.md
  - Exercises:
      - '01. `git init` (Due April 9th)': https://classroom.github.com/a/6fFVVHyL
      - '02. bugs, ducks, and data': https://classroom.github.com/a/nPCmNefU
      - '03. `JOIN` the `DISTINCT` with SQL': https://classroom.github.com/a/hXtQfWAB
      - "04. It's about time": https://classroom.github.com/a/Nt5jaJsY
      - '05. Classification: Putting a label on it': https://classroom.github.com/a/i99LRj_R
      - '06. Neural Networks: If I only had a brain': https://classroom.github.com/a/7lg-zjaN
      - '07. Transformers': https://classroom.github.com/a/4rXS-dEj
      - 'Final Project': https://classroom.github.com/a/lqRvusMP

